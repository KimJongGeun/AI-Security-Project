################################################################################
# Claude Code 보안 모니터링 - Logstash 파이프라인
#
# HTTP로 수신한 Claude Code Hook 이벤트에 대해 보안 분석을 수행한다.
# - DLP: 민감정보(PII, 인증정보) 탐지
# - 위험 명령어 탐지 (Bash 도구)
# - 민감 파일 접근 탐지
#
# 분석 결과는 claude-audit 인덱스에 저장하고,
# 보안 이벤트가 탐지된 경우 claude-security-alerts 인덱스에 별도 저장한다.
################################################################################

input {
  # HTTP 직접 수신 (각 PC의 Claude Code Hook에서 전송)
  http {
    port => 8080
    codec => json
  }
}

filter {

  # ── 1. 메타 정보 정규화 ────────────────────────────────────────

  # HTTP input이 추가하는 불필요한 필드 제거
  mutate {
    remove_field => ["headers", "ecs", "agent", "input", "host", "log", "url", "user_agent"]
  }

  # timestamp 보정
  if [@timestamp] {
    date {
      match => ["@timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  # hook_event_name 정규화 (HTTP hook은 hook_event_name 필드로 전송)
  if [hook_event_name] and ![hook_event] {
    mutate {
      rename => { "hook_event_name" => "hook_event" }
    }
  }

  # ── 2. DLP: 민감정보 탐지 ──────────────────────────────────────

  # 프롬프트 검사
  if [prompt] {
    ruby {
      code => '
        text = event.get("prompt") || ""
        pii_types = []
        pii_count = 0

        # 한국 개인정보
        matches = text.scan(/\d{6}\s?-\s?[1-4]\d{6}/)
        if !matches.empty?
          pii_types << "kr_resident_id"
          pii_count += matches.length
        end

        matches = text.scan(/01[0-9]-?\d{3,4}-?\d{4}/)
        if !matches.empty?
          pii_types << "phone_kr"
          pii_count += matches.length
        end

        matches = text.scan(/\d{3}-\d{2}-\d{5}/)
        if !matches.empty?
          pii_types << "kr_business_no"
          pii_count += matches.length
        end

        # 이메일
        matches = text.scan(/[\w.+-]+@[\w-]+\.[\w.]+/)
        if !matches.empty?
          pii_types << "email"
          pii_count += matches.length
        end

        # 금융정보
        matches = text.scan(/\b\d{4}[\s-]?\d{4}[\s-]?\d{4}[\s-]?\d{4}\b/)
        if !matches.empty?
          pii_types << "credit_card"
          pii_count += matches.length
        end

        # 인증정보 / 시크릿
        if text =~ /sk-(?:proj-)?[a-zA-Z0-9_-]{20,}/
          pii_types << "api_key_openai"
          pii_count += 1
        end
        if text =~ /AKIA[A-Z0-9]{16}/
          pii_types << "api_key_aws"
          pii_count += 1
        end
        if text =~ /ghp_[a-zA-Z0-9]{36}/
          pii_types << "api_key_github"
          pii_count += 1
        end
        if text =~ /sk-ant-[a-zA-Z0-9\-]{90,}/
          pii_types << "api_key_anthropic"
          pii_count += 1
        end
        if text =~ /-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----/
          pii_types << "private_key"
          pii_count += 1
        end
        if text =~ /eyJ[a-zA-Z0-9_-]{10,}\.[a-zA-Z0-9_-]{10,}\.[a-zA-Z0-9_-]{10,}/
          pii_types << "jwt_token"
          pii_count += 1
        end
        if text =~ /\b[MS]\d{8}\b/
          pii_types << "passport_kr"
          pii_count += 1
        end

        # 고위험 PII 판별
        high_risk_types = ["kr_resident_id", "api_key_openai", "api_key_aws",
                           "api_key_github", "api_key_anthropic", "private_key", "jwt_token"]
        has_high_risk = pii_types.any? { |t| high_risk_types.include?(t) }

        event.set("[security][pii_detected]", !pii_types.empty?)
        event.set("[security][pii_types]", pii_types)
        event.set("[security][pii_count]", pii_count)
        event.set("[security][pii_high_risk]", has_high_risk)
      '
    }
  }

  # ── 3. 위험 명령어 탐지 ────────────────────────────────────────

  if [tool_name] == "Bash" and [tool_input][command] {
    ruby {
      code => '
        cmd = event.get("[tool_input][command]") || ""
        risk_level = "low"
        risk_reasons = []

        # 고위험 명령어
        high_risk_patterns = {
          "rm -rf /"           => /rm\s+(-rf|-r\s+-f|-f\s+-r)\s+\//i,
          "rm -rf ~"           => /rm\s+(-rf|-r\s+-f|-f\s+-r)\s+~/i,
          "sudo rm -rf"        => /sudo\s+rm\s+(-rf|-r\s+-f|-f\s+-r)/i,
          "mkfs"               => /mkfs\./i,
          "dd to device"       => /dd\s+if=.*of=\/dev\//i,
          "redirect to device" => />\s*\/dev\/sd/i,
          "chmod 777 /"        => /chmod\s+777\s+\//i,
          "curl pipe shell"    => /curl\s+[^\|]+\|\s*(bash|sh)/i,
          "wget pipe shell"    => /wget\s+[^\|]+\|\s*(bash|sh)/i,
          "fork bomb"          => /:\(\)\s*\{.*\}/,
          "base64 pipe shell"  => /base64\s+-d.*\|\s*(bash|sh)/i,
          "python reverse shell" => /python.*socket.*connect/i,
          "nc reverse shell"   => /nc\s+.*-e\s+\/bin\/(ba)?sh/i,
        }

        high_risk_patterns.each do |name, pattern|
          if cmd.match?(pattern)
            risk_level = "high"
            risk_reasons << name
          end
        end

        # 민감 파일 접근
        sensitive_files = [".env", "id_rsa", "id_ed25519", ".pem", ".p12", ".pfx",
                          "credentials", "secrets", "passwd", "shadow",
                          ".aws/credentials", ".ssh/", "authorized_keys",
                          ".netrc", ".npmrc", ".pypirc"]
        sensitive_files.each do |f|
          if cmd.include?(f)
            risk_level = "high"
            risk_reasons << "sensitive_file:#{f}"
          end
        end

        # 중위험 명령어
        if risk_level != "high"
          medium_risk = ["sudo", "passwd", "chown", "chmod", "pkill", "killall",
                        "systemctl", "service", "iptables", "ufw", "firewall-cmd"]
          medium_risk.each do |pattern|
            if cmd.match?(/\b#{Regexp.escape(pattern)}\b/)
              risk_level = "medium"
              risk_reasons << pattern
            end
          end
        end

        event.set("[security][command_risk_level]", risk_level)
        event.set("[security][command_risk_reasons]", risk_reasons)
      '
    }
  }

  # ── 4. tool_response 크기 제한 (60KB) ──────────────────────────

  if [tool_response] {
    ruby {
      code => '
        tr = event.get("tool_response")
        tr_str = tr.is_a?(String) ? tr : tr.to_json
        if tr_str.length > 61440
          event.set("tool_response", tr_str[0..61439])
          event.set("tool_response_truncated", true)
        end
      '
    }
  }

  # ── 5. 보안 이벤트 종합 판정 ───────────────────────────────────

  ruby {
    code => '
      is_alert = false
      alert_reasons = []

      if event.get("[security][pii_high_risk]") == true
        is_alert = true
        alert_reasons << "high_risk_pii"
      end

      if event.get("[security][command_risk_level]") == "high"
        is_alert = true
        alert_reasons << "high_risk_command"
      end

      event.set("[security][is_alert]", is_alert)
      event.set("[security][alert_reasons]", alert_reasons)
    '
  }
}

output {
  # 전체 감사 로그
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "claude-audit-%{+YYYY.MM.dd}"
  }

  # 보안 알림 (고위험 이벤트만 별도 인덱스)
  if [security][is_alert] == true {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "claude-security-alerts-%{+YYYY.MM.dd}"
    }
  }
}
